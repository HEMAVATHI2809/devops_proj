x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    image: ${FRONTEND_IMAGE:-appointment-scheduler-frontend}:${IMAGE_TAG:-latest}
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks:
      - edge
      - app-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-appointment-scheduler-backend}:${IMAGE_TAG:-latest}
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      JWT_SECRET: ${JWT_SECRET:-appointment-scheduler-docker-dev-jwt-secret-min-32-chars}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/appointments}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/appointments}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:3001}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *default-logging
    networks:
      - app-internal

  mongo:
    image: mongo:7.0
    command: ["mongod", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    init: true
    healthcheck:
      # Exit code drives Docker health status; ensure we return 0/1 explicitly.
      test: ["CMD-SHELL", "mongosh --quiet --eval \"quit(db.adminCommand('ping').ok ? 0 : 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks:
      - app-internal

volumes:
  mongo_data:

networks:
  edge:
    driver: bridge
  app-internal:
    driver: bridge
    internal: true
